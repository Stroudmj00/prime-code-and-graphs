name: CI

on:
  push:
  pull_request:

jobs:
  build-verify-plot:
    name: Build, verify, and render graphs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Build portable binary
        run: python scripts/build.py --portable

      - name: Verify algorithms
        run: python scripts/verify.py --fast

      - name: Render graph smoke test
        run: python scripts/plot.py output/data/benchmark.csv -o output/graphs-ci

      - name: Upload rendered graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: graph-smoke-output
          path: output/graphs-ci/
